naftiko: "1.0.0-alpha1"

info:
  label: Smithsonian Open Access API
  description: >-
    The Smithsonian Open Access API provides programmatic access to collections data
    from 19 museums, 21 libraries, and 9 research centers. Enables search and retrieval
    of objects, artworks, specimens, and associated media.
  tags:
    - Smithsonian Institution
    - Collections
    - Museums
    - Open Data
    - Cultural Heritage
    - Natural History
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SMITHSONIAN_API_KEY: SMITHSONIAN_API_KEY

capability:
  consumes:
    - type: http
      namespace: smithsonian-open-access
      baseUri: https://edan.si.edu/openaccess
      description: Smithsonian Open Access API for collection data retrieval
      authentication:
        type: apikey
        key: api_key
        value: "{{SMITHSONIAN_API_KEY}}"
        placement: query
      resources:
        - name: content
          path: /api/content
          description: Individual collection item retrieval
          operations:
            - name: get-content
              method: GET
              description: Get detailed metadata for a specific collection item by ID
              inputParameters:
                - name: id
                  in: query
                  type: string
                  required: true
                  description: Unique identifier of the collection item
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: search
          path: /api/search/search
          description: Full-text collection search
          operations:
            - name: search-collections
              method: GET
              description: Search across all Smithsonian collections
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: true
                  description: Search query
                - name: start
                  in: query
                  type: integer
                  required: false
                  description: Pagination offset
                - name: rows
                  in: query
                  type: integer
                  required: false
                  description: Number of results
                - name: sort
                  in: query
                  type: string
                  required: false
                  description: Sort order (relevancy, id, newest, updated, random)
                - name: type
                  in: query
                  type: string
                  required: false
                  description: Record type filter (edanmdm, ead_collection, all)
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: category-search
          path: /api/search/category_search
          description: Category-filtered collection search
          operations:
            - name: search-by-category
              method: GET
              description: Search collections filtered by subject category
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: true
                  description: Search query
                - name: category
                  in: query
                  type: string
                  required: false
                  description: Category (art_design, history_culture, science_technology)
                - name: start
                  in: query
                  type: integer
                  required: false
                  description: Pagination offset
                - name: rows
                  in: query
                  type: integer
                  required: false
                  description: Number of results
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: terms
          path: /api/search/terms
          description: Search facet terms
          operations:
            - name: get-search-terms
              method: GET
              description: Get available facet terms for a category
              inputParameters:
                - name: category
                  in: query
                  type: string
                  required: true
                  description: Facet category (culture, date, object_type, topic, place, etc.)
                - name: starts_with
                  in: query
                  type: string
                  required: false
                  description: Filter terms by starting character
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: metrics
          path: /api/metrics/stats
          description: Collection metrics and statistics
          operations:
            - name: get-metrics-stats
              method: GET
              description: Get aggregate statistics about the Smithsonian collection
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: smithsonian-rest
      resources:
        - path: /v1/collections/search
          name: search
          description: Collection search
          operations:
            - method: GET
              name: search-collections
              description: Search Smithsonian collections
              call: "smithsonian-open-access.search-collections"
              with:
                q: "rest.q"
                start: "rest.start"
                rows: "rest.rows"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/collections/{id}
          name: collection-item
          description: Individual collection item
          operations:
            - method: GET
              name: get-content
              description: Get collection item by ID
              call: "smithsonian-open-access.get-content"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: smithsonian-mcp
      transport: http
      tools:
        - name: search-collections
          description: Search across Smithsonian museum collections
          hints:
            readOnly: true
            openWorld: true
          call: "smithsonian-open-access.search-collections"
          with:
            q: "tools.q"
            start: "tools.start"
            rows: "tools.rows"
            sort: "tools.sort"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-by-category
          description: Search collections by subject category (art, history, science)
          hints:
            readOnly: true
            openWorld: true
          call: "smithsonian-open-access.search-by-category"
          with:
            q: "tools.q"
            category: "tools.category"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-collection-item
          description: Get full metadata for a specific collection item by ID
          hints:
            readOnly: true
            openWorld: true
          call: "smithsonian-open-access.get-content"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-search-terms
          description: Get available facet values for search filtering
          hints:
            readOnly: true
            openWorld: true
          call: "smithsonian-open-access.get-search-terms"
          with:
            category: "tools.category"
            starts_with: "tools.starts_with"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-collection-metrics
          description: Get aggregate statistics about the Smithsonian collections
          hints:
            readOnly: true
            openWorld: true
          call: "smithsonian-open-access.get-metrics-stats"
          outputParameters:
            - type: object
              mapping: "$."
