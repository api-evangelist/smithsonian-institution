aid: smithsonian-institution
name: Smithsonian Institution
description: >-
  The Smithsonian Institution provides open access APIs to its collections of
  over 22 million objects, artworks, and natural history specimens from 19
  museums, 21 libraries, and 9 research centers. The Open Access API enables
  developers to search and retrieve collection data, images, and metadata.
